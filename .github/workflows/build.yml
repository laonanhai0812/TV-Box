name: 构建自定义影视仓 APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App 显示名称（中文/英文均可）'
        required: true
        default: '我的影视仓'
      package_name:
        description: '包名（如 com.myapp.tv，全小写字母+点）'
        required: true
        default: 'com.myapp.tv'
      config_url:
        description: '默认配置接口地址'
        required: false
        default: 'https://jihulab.com/z-blog/xh2/-/raw/main/t3.json'
      version_name:
        description: '版本号（如 1.0.0）'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取影视仓源码
        run: |
          git clone --depth=1 https://github.com/FongMi/TV.git tvbox-src

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 替换 App 名称和包名
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PKG="${{ github.event.inputs.package_name }}"
          VER="${{ github.event.inputs.version_name }}"
          CFG_URL="${{ github.event.inputs.config_url }}"
          cd tvbox-src

          OLD_PKG=$(grep -r "applicationId" app/build.gradle 2>/dev/null | head -1 | grep -oP '"[^"]+"' | tr -d '"' || echo "com.fongmi.android.tv")

          find . -name "strings.xml" | while read f; do
            sed -i "s|<string name=\"app_name\">[^<]*</string>|<string name=\"app_name\">${APP_NAME}</string>|g" "$f"
          done
          find . -type f \( -name "*.kt" -o -name "*.java" \) -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          find . -name "AndroidManifest.xml" -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          sed -i "s|applicationId \"${OLD_PKG}\"|applicationId \"${PKG}\"|g" app/build.gradle 2>/dev/null || true
          sed -i "s|versionName \"[^\"]*\"|versionName \"${VER}\"|g" app/build.gradle 2>/dev/null || true

          if [ -n "$CFG_URL" ]; then
            CFG_FILE=$(find . -name "strings.xml" | head -1)
            if grep -q 'name="default_config"' "$CFG_FILE" 2>/dev/null; then
              sed -i "s|<string name=\"default_config\">[^<]*</string>|<string name=\"default_config\">${CFG_URL}</string>|g" "$CFG_FILE"
            else
              sed -i "s|</resources>|    <string name=\"default_config\">${CFG_URL}</string>\n</resources>|" "$CFG_FILE"
            fi
          fi

      - name: 编译 APK
        run: |
          cd tvbox-src
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint

      - name: 签名 APK
        run: |
          cd tvbox-src
          keytool -genkeypair -v \
            -keystore my-release-key.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias mykey \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=MyApp, OU=Dev, O=MyOrg, L=CN, S=CN, C=CN"

          APK=$(find . -name "*.apk" -path "*/release/*" | head -1)
          BT=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $BT/zipalign -v 4 "$APK" aligned.apk
          $BT/apksigner sign \
            --ks my-release-key.jks \
            --ks-pass pass:android123 \
            --key-pass pass:android123 \
            --out "custom_${{ github.event.inputs.version_name }}.apk" \
            aligned.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version_name }}
          path: tvbox-src/custom_${{ github.event.inputs.version_name }}.apk
          retention-days: 30
