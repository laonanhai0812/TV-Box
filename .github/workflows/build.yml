name: 构建自定义影视仓 APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App 显示名称'
        required: true
        default: '我的影视仓'
      package_name:
        description: '包名（com.xxx.xxx）'
        required: true
        default: 'com.myapp.tv'
      config_url:
        description: '默认配置接口地址'
        required: false
        default: 'https://jihulab.com/z-blog/xh2/-/raw/main/t3.json'
      version_name:
        description: '版本号'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取影视仓源码
        run: |
          git clone --depth=1 https://github.com/FongMi/TV.git tvbox-src

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 手动安装 Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: 替换 App 名称和包名
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PKG="${{ github.event.inputs.package_name }}"
          VER="${{ github.event.inputs.version_name }}"
          CFG_URL="${{ github.event.inputs.config_url }}"
          cd tvbox-src

          OLD_PKG=$(grep "applicationId" app/build.gradle 2>/dev/null | head -1 | grep -oP '"[^"]+"' | tr -d '"' || echo "com.fongmi.android.tv")
          echo "原始包名: $OLD_PKG"

          find . -name "strings.xml" | while read f; do
            sed -i "s|<string name=\"app_name\">[^<]*</string>|<string name=\"app_name\">${APP_NAME}</string>|g" "$f"
          done

          find . -type f \( -name "*.kt" -o -name "*.java" \) -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          find . -name "AndroidManifest.xml" -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          sed -i "s|applicationId \"${OLD_PKG}\"|applicationId \"${PKG}\"|g" app/build.gradle 2>/dev/null || true
          sed -i "s|versionName \"[^\"]*\"|versionName \"${VER}\"|g" app/build.gradle 2>/dev/null || true

          if [ -n "$CFG_URL" ]; then
            CFG_FILE=$(find . -name "strings.xml" | head -1)
            if grep -q 'name="default_config"' "$CFG_FILE" 2>/dev/null; then
              sed -i
