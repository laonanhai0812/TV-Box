name: 构建自定义影视仓 APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App 显示名称'
        required: true
        default: '我的影视仓'
      package_name:
        description: '包名（com.xxx.xxx）'
        required: true
        default: 'com.myapp.tv'
      config_url:
        description: '默认配置接口地址'
        required: false
        default: 'https://jihulab.com/z-blog/xh2/-/raw/main/t3.json'
      version_name:
        description: '版本号'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_NAME: ${{ github.event.inputs.app_name }}
      PKG: ${{ github.event.inputs.package_name }}
      VER: ${{ github.event.inputs.version_name }}
      CFG_URL: ${{ github.event.inputs.config_url }}
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_SDK_ROOT: /home/runner/android-sdk

    steps:
      - name: 拉取影视仓源码
        run: |
          git clone --depth=1 https://github.com/FongMi/TV.git tvbox-src

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          mkdir -p $ANDROID_HOME/cmdline-tools
          unzip -q cmdtools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: 修复构建配置
        run: |
          cd tvbox-src

          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "✅ local.properties 已创建"

          echo "=== app/build.gradle 完整内容 ==="
          cat app/build.gradle
          
      - name: 替换 App 名称和包名
        run: |
          cd tvbox-src

          OLD_PKG=$(grep "applicationId" app/build.gradle 2>/dev/null | head -1 | grep -oP '"[^"]+"' | tr -d '"' || echo "com.fongmi.android.tv")
          echo "原始包名: $OLD_PKG  →  新包名: $PKG"

          find . -name "strings.xml" -exec \
            sed -i "s|<string name=\"app_name\">[^<]*</string>|<string name=\"app_name\">${APP_NAME}</string>|g" {} +

          find . -type f \( -name "*.kt" -o -name "*.java" \) \
            -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          find . -name "AndroidManifest.xml" \
            -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          sed -i "s|applicationId \"${OLD_PKG}\"|applicationId \"${PKG}\"|g" app/build.gradle || true
          sed -i "s|versionName \"[^\"]*\"|versionName \"${VER}\"|g" app/build.gradle || true

          CFG_FILE=$(find . -name "strings.xml" | head -1)
          if [ -n "$CFG_URL" ] && [ -n "$CFG_FILE" ]; then
            if grep -q 'name="default_config"' "$CFG_FILE"; then
              sed -i "s|<string name=\"default_config\">[^<]*</string>|<string name=\"default_config\">${CFG_URL}</string>|g" "$CFG_FILE"
            else
              sed -i "s|</resources>|    <string name=\"default_config\">${CFG_URL}</string>\n</resources>|" "$CFG_FILE"
            fi
          fi
          echo "✅ 替换完成"

      - name: 编译 APK
        run: |
          cd tvbox-src
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint 2>&1
          echo "=== 查找生成的 APK ==="
          find . -name "*.apk" -type f

      - name: 签名 APK
        run: |
          cd tvbox-src

          APK=$(find . -name "*.apk" -type f | head -1)
          echo "找到 APK: $APK"

          if [ -z "$APK" ]; then
            echo "❌ 未找到 APK"
            exit 1
          fi

          keytool -genkeypair -v \
            -keystore my-release-key.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias mykey \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=MyApp,O=MyOrg,C=CN" 2>/dev/null

          BT=$ANDROID_HOME/build-tools/35.0.0
          $BT/zipalign -v 4 "$APK" aligned.apk
          $BT/apksigner sign \
            --ks my-release-key.jks \
            --ks-pass pass:android123 \
            --key-pass pass:android123 \
            --out "output_v${VER}.apk" \
            aligned.apk

          echo "✅ 签名完成"
          ls -lh output_*.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version_name }}
          path: tvbox-src/output_v${{ github.event.inputs.version_name }}.apk
          retention-days: 30
