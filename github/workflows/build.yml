name: 构建自定义影视仓 APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App 显示名称（中文/英文均可）'
        required: true
        default: '我的影视仓'
      package_name:
        description: '包名（如 com.myapp.tv，全小写字母+点）'
        required: true
        default: 'com.myapp.tv'
      config_url:
        description: '默认配置接口地址（填入后打开 App 自动加载）'
        required: false
        default: 'https://jihulab.com/z-blog/xh2/-/raw/main/t3.json'
      version_name:
        description: '版本号（如 1.0.0）'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取影视仓源码
        run: |
          git clone --depth=1 https://github.com/FongMi/TV.git tvbox-src
          echo "✅ 源码拉取完成"

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 替换 App 名称
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PKG="${{ github.event.inputs.package_name }}"
          VER="${{ github.event.inputs.version_name }}"
          CFG_URL="${{ github.event.inputs.config_url }}"

          cd tvbox-src

          # 替换 App 名称（strings.xml）
          find . -name "strings.xml" | while read f; do
            sed -i "s|<string name=\"app_name\">[^<]*</string>|<string name=\"app_name\">${APP_NAME}</string>|g" "$f"
          done

          # 替换包名
          OLD_PKG=$(grep -r "applicationId" app/build.gradle 2>/dev/null | head -1 | grep -oP '"[^"]+"' | tr -d '"' || echo "com.fongmi.android.tv")
          find . -type f \( -name "*.kt" -o -name "*.java" \) -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          find . -name "AndroidManifest.xml" -exec sed -i "s|${OLD_PKG}|${PKG}|g" {} +
          sed -i "s|applicationId \"${OLD_PKG}\"|applicationId \"${PKG}\"|g" app/build.gradle 2>/dev/null || true

          # 替换版本号
          sed -i "s|versionName \"[^\"]*\"|versionName \"${VER}\"|g" app/build.gradle 2>/dev/null || true

          # 写入默认配置地址
          if [ -n "$CFG_URL" ]; then
            CFG_FILE=$(find . -name "strings.xml" | head -1)
            if grep -q 'name="default_config"' "$CFG_FILE" 2>/dev/null; then
              sed -i "s|<string name=\"default_config\">[^<]*</string>|<string name=\"default_config\">${CFG_URL}</string>|g" "$CFG_FILE"
            else
              sed -i "s|</resources>|    <string name=\"default_config\">${CFG_URL}</string>\n</resources>|" "$CFG_FILE"
            fi
          fi

          echo "✅ 名称/包名/配置替换完成"
          echo "App名称: ${APP_NAME}"
          echo "包名: ${PKG}"
          echo "版本: ${VER}"

      - name: 编译 APK
        run: |
          cd tvbox-src
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint 2>&1 | tail -50

      - name: 对齐并签名 APK（自签名）
        run: |
          cd tvbox-src

          # 生成临时签名密钥
          keytool -genkeypair -v \
            -keystore my-release-key.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias mykey \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=MyApp, OU=Dev, O=MyOrg, L=CN, S=CN, C=CN"

          # 找到生成的 APK
          APK=$(find . -name "*.apk" -path "*/release/*" | head -1)
          echo "找到 APK: $APK"

          # zipalign 对齐
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/zipalign \
            -v 4 "$APK" aligned.apk

          # apksigner 签名
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner \
            sign \
            --ks my-release-key.jks \
            --ks-pass pass:android123 \
            --key-pass pass:android123 \
            --out "custom_tv_${{ github.event.inputs.version_name }}.apk" \
            aligned.apk

          echo "✅ APK 签名完成"
          ls -lh custom_tv_*.apk

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: 自定义影视仓-${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version_name }}
          path: tvbox-src/custom_tv_*.apk
          retention-days: 30

      - name: 输出构建摘要
        run: |
          echo "## ✅ 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 内容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| App 名称 | ${{ github.event.inputs.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 包名 | ${{ github.event.inputs.package_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | ${{ github.event.inputs.version_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 默认接口 | ${{ github.event.inputs.config_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 下载 | 见右侧 Artifacts |" >> $GITHUB_STEP_SUMMARY

